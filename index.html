<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rangoli - Menu</title>
  <meta name="description" content="Digital menu for Rangoli">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #10b981, #06b6d4);
      padding: 2rem 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 1.75rem; font-weight: 700; }
    .header p { opacity: 0.8; margin-top: 0.25rem; font-size: 0.875rem; }
    .menu-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }
    .menu-page {
      margin-bottom: 1rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .menu-page img {
      width: 100%;
      height: auto;
      display: block;
    }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      opacity: 0.5;
      font-size: 0.75rem;
    }
    @media (min-width: 768px) {
      .header h1 { font-size: 2.5rem; }
      .menu-container { padding: 2rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Rangoli</h1>
    <p>Digital Menu</p>
  </header>
  <main class="menu-container">
    <p style="text-align:center;padding:3rem;opacity:0.6;">Menu coming soon</p>
  </main>
  <footer class="footer">
    Powered by Smart QR Menu Deployer
  </footer>
</body>
</html>
